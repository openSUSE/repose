[project]
name = "repose"
description = "Manipulate repositories in QAM refhosts"
readme = "README.md"
requires-python = ">=3.11"
license = "GPL-3.0-or-later"
authors = [{ name = "Ondřej Súkup", email = "osukup@suse.cz" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.13",
]
scripts = { repose = "repose.main:main" }
dependencies = [
  "paramiko",
  "ruamel.yaml",
]
dynamic = ["version"]

[project.urls]
Homepage = "https://github.com/openSUSE/repose"
Repository = "https://github.com/openSUSE/repose"

[dependency-groups]
dev = [
  "pytest",
  "pytest-cov",
  "ruff",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.dynamic]
version = { attr = "repose.__version__" }
