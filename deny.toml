# cargo-deny config for the repose Rust workspace (cargo-deny >= 0.18.4 / 0.20.x).
#
# From the repository root:
#   cargo deny check
#
# CI: EmbarkStudios/cargo-deny-action@v2 discovers this file next to the
# workspace Cargo.toml.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
# Fail hard on unmaintained *workspace* crates; transitive noise can wait until
# the graph grows (russh). Override with ignore + issue id if needed.
unmaintained = "workspace"
ignore = [
    # Marvin Attack (RSA timing sidechannel). Pulled transitively by russh
    # via rsa 0.10.0-rc.x / ssh-key. RustSec reports no safe upgrade yet.
    # Revisit when russh/rsa ship a fixed release (RUSTSEC-2023-0071).
    # https://rustsec.org/advisories/RUSTSEC-2023-0071
    { id = "RUSTSEC-2023-0071", reason = "transitive via russh; no fixed rsa crate yet" },
]

[licenses]
version = 2
confidence-threshold = 0.8
# Pre-approve licenses we expect once real deps land (russh, tokio, clap, …).
# unused-allowed-license=allow so an empty graph does not WARN-spam CI.
unused-allowed-license = "allow"
allow = [
    # Project license
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    # Common permissive (tokio/clap/serde ecosystem)
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "0BSD",
    # Occasional in crypto / OpenSSL-compat crates
    "OpenSSL",
    # LGPL family (some SSH/crypto transitive history; prefer MIT/Apache)
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    # Rare but seen in older graphs. GPLv2-only (and the deprecated bare
    # "GPL-2.0" alias) is deliberately absent: it is GPLv3-incompatible and no
    # dependency needs it. "or-later" is fine (upgradeable to GPLv3).
    "GPL-2.0-or-later",
]
exceptions = []

[bans]
multiple-versions = "warn"
# Path deps must pin the workspace version, currently `version = "3.0.0"`
# (see crate Cargo.toml comments).
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# Single SSH backend policy (design: russh only).
deny = [
    { name = "ssh2", reason = "single SSH backend is russh only" },
    { name = "libssh2-sys", reason = "single SSH backend is russh only" },
    { name = "async-ssh2-lite", reason = "single SSH backend is russh only" },
    { name = "async-ssh2-tokio", reason = "single SSH backend is russh only" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
