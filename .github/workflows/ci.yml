---
name: ci
on:
  push:
    branches: [master]
    tags: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but let master/tag runs finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Rust workspace — the sole implementation since the Python
  # cutover . Python and its jobs were removed.
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        # Pin a commit from the action's master branch (commits of the
        # toolchain branches are garbage-collected upstream) and select the
        # toolchain via the input instead of the ref.
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Cache cargo
        # Tag runs re-verify a release: keep them off restored build state;
        # PR/master runs keep the cache.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Layering (core ↛ ssh/russh)
        run: bash scripts/check-rust-layering.sh
      - name: Test
        run: cargo test --workspace --all-targets --locked
      - name: Binary version line
        # Shape matches the historical Python line: `repose version: X.Y.Z`
        # (value is the crate version). Do not hard-code a version.
        run: |
          out="$(cargo run -q --locked -p repose-cli --bin repose -- --version)"
          echo "got: $out"
          echo "$out" | grep -E '^repose version: [0-9]+\.[0-9]+\.[0-9]+$'

  rust-macos:
    # Portability check on macOS (Apple Silicon, aarch64-apple-darwin): build
    # and test the workspace + SSH transport so the platform stays viable for
    # release binaries. Kept lean (no fmt — formatting is platform-independent
    # and covered by the ubuntu `rust` job).
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          toolchain: stable
          components: clippy
      - name: Cache cargo
        # Tag runs re-verify a release: keep them off restored build state;
        # PR/master runs keep the cache.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets --locked

  rust-beta:
    # Early warning on the upcoming compiler: never blocks, but surfaces
    # new-lint and regression noise before beta becomes stable. No fmt leg
    # (beta rustfmt formatting may legitimately drift).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain (beta)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          toolchain: beta
          components: clippy
      - name: Cache cargo
        # Tag runs re-verify a release: keep them off restored build state;
        # PR/master runs keep the cache.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target
      - name: Clippy (beta)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test (beta)
        run: cargo test --workspace --all-targets --locked

  rust-deny:
    # Dependency policy for the Rust workspace. Config: deny.toml
    # next to the workspace manifest (auto-discovered by cargo-deny).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25  # v2
        with:
          manifest-path: Cargo.toml
          command: check
          # Empty arguments: do not force --all-features on an empty graph.
          arguments: ""

  rust-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Cache cargo
        # Tag runs re-verify a release: keep them off restored build state;
        # PR/master runs keep the cache.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7  # v2.85.0
        with:
          tool: cargo-llvm-cov@0.8.7
      - name: Test with OpenSSH and enforce coverage ratchet
        run: tests/ssh/run.sh scripts/check-coverage.sh
      - name: Upload LCOV report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rust-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  rust-cli:
    # CLI consistency self-check: known-products byte-identity vs the committed
    # expected output (tests/vectors/cli/known_products.txt) + CLI-surface
    # invariants (no --ssh-backend, version-line shape, all nine subcommands).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          toolchain: stable
      - name: Cache cargo
        # Tag runs re-verify a release: keep them off restored build state;
        # PR/master runs keep the cache.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target
      - name: Build Rust binary
        run: cargo build --locked -p repose-cli
      - name: CLI consistency self-check
        env:
          REPOSE_RS: target/debug/repose
        run: bash scripts/check-cli.sh

  rust-assets-drift:
    # Regenerate the committed man pages + shell completions from the clap CLI
    # and fail if they drift.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          toolchain: stable
      - name: Cache cargo
        # Tag runs re-verify a release: keep them off restored build state;
        # PR/master runs keep the cache.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target
      - name: Regenerate man pages + completions
        run: cargo run --locked -p repose-cli --features gen --bin repose-gen -- crates/repose-cli
      - name: Check for drift
        # Fail on modified tracked assets AND on untracked leftovers (e.g. a
        # renamed page that regeneration no longer produces/overwrites).
        run: |
          git diff --exit-code -- crates/repose-cli/man crates/repose-cli/completions
          untracked="$(git status --porcelain -- crates/repose-cli/man crates/repose-cli/completions)"
          if [ -n "$untracked" ]; then
            echo "::error::untracked generated assets:"
            echo "$untracked"
            exit 1
          fi

  rust-msrv:
    # Build with the minimum supported Rust version (rust-version in
    # Cargo.toml) so MSRV cannot silently drift.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # master
        with:
          # Keep in sync with rust-version in Cargo.toml and
          # rust-toolchain.toml.
          toolchain: "1.96"
      - name: Cache cargo
        # Tag runs re-verify a release: keep them off restored build state;
        # PR/master runs keep the cache.
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target
      - name: Build (MSRV)
        run: cargo build --workspace --locked
