---
name: ci
on:
  push:
    branches: [master]
    tags: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but let master/tag runs finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89  # v4.1.0
        with:
          args: "--version"
      - name: Check style
        run: ruff format --diff .
      - name: Lint - ruff
        run: ruff check .
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: '3.13'
          cache-suffix: typecheck
      - name: Install dependencies
        run: uv sync --locked
      - name: Type check - ty
        run: uv run ty check repose
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.13', '3.14']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache-suffix: test-${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked
      - name: Test with pytest
        run: uv run pytest --cov=repose --cov-fail-under=80
  docs:
    # Builds the Sphinx HTML docs with warnings-as-errors so a broken
    # .rst reference or config warning fails the PR instead of merging
    # silently. Previously only man-page drift was checked.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: '3.13'
          cache-suffix: docs
      - name: Build docs
        run: >-
          uv run --locked --group doc
          sphinx-build -b html -W --keep-going docs docs/_build/html
  man-drift:
    # Regenerates docs/man/*.1 from the Typer CLI and fails if the
    # committed pages drift from what `uv run repose-mangen` produces.
    # Catches the case where a contributor edits a subcommand's help
    # text or flags but forgets to refresh the man pages.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: '3.13'
          cache-suffix: man-drift
      - name: Install dependencies
        run: uv sync --locked
      - name: Regenerate man pages
        run: uv run repose-mangen
      - name: Check for drift
        run: git diff --exit-code -- docs/man/

  # --- Rust rewrite workspace (crates/) ---
  # Python jobs above stay the oracle until cutover. This job only
  # builds/tests the in-progress Rust rewrite (docs/design/rust-rewrite.md).
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: crates -> target
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Layering (core ↛ ssh/russh)
        # Script lives at repo root; job working-directory is crates/.
        run: bash ../scripts/check-rust-layering.sh
      - name: Test
        run: cargo test --workspace
      - name: Binary version line
        # Shape matches Python: `repose version: X.Y.Z` (value is crate version).
        # Do not hard-code 0.1.0 — that breaks every workspace version bump.
        run: |
          out="$(cargo run -q -p repose-cli)"
          echo "got: $out"
          echo "$out" | grep -E '^repose version: [0-9]+\.[0-9]+\.[0-9]+$'

  rust-deny:
    # Dependency policy for the Rust rewrite. Config: crates/deny.toml
    # next to the workspace manifest (auto-discovered by cargo-deny).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/Cargo.toml
          command: check
          # Empty arguments: do not force --all-features on a empty graph.
          arguments: ""

