---
name: release
# yamllint disable-line rule:truthy
on:
  push:
    tags:
      # Version tags: 3.0.0, optionally with a pre-release suffix (3.0.0rc1).
      # The project tags without a "v" prefix.
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # required for `gh release create`
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: . -> target

      - name: Verify tag matches workspace version
        run: |
          pkg="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' != workspace version '$pkg'"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --locked -p repose-cli

      - name: Package release artifact
        run: |
          triple="x86_64-unknown-linux-gnu"
          dist="repose-${GITHUB_REF_NAME}-${triple}"
          mkdir "$dist"
          cp target/release/repose LICENSE README.md "$dist/"
          cp -r crates/repose-cli/man crates/repose-cli/completions "$dist/"
          tar czf "${dist}.tar.gz" "$dist"
          sha256sum "${dist}.tar.gz" >"${dist}.tar.gz.sha256"
          echo "DIST=$dist" >>"$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --title "$GITHUB_REF_NAME"
          --generate-notes
          "${DIST}.tar.gz" "${DIST}.tar.gz.sha256"
