---
# Dependabot configuration.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Rust dependencies for the root cargo workspace.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows. Keeps the SHA-pinned actions in
  # ci.yml / release.yml current so they cannot silently rot the
  # way codeql-action@v2 did.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
