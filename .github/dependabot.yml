---
# Dependabot configuration.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Rust dependencies for the root cargo workspace.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows. Keeps the SHA-pinned actions in
  # ci.yml / release.yml current so they cannot silently rot the
  # way codeql-action@v2 did.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # dtolnay/rust-toolchain pins the Rust version in the git ref (e.g.
    # @1.96 installs Rust 1.96), not the action's own release version.
    # Dependabot reads the ref as semver and "bumps" it to nonexistent
    # Rust toolchains (e.g. 1.100). The MSRV must only change deliberately
    # alongside Cargo.toml `rust-version` and rust-toolchain.toml.
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
